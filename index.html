<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LENORIO</title>
    <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --anim-speed: 4s;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            background: var(--bg-color);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Обертка-ссылка на весь экран */
        .main-link {
            position: absolute;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            z-index: 2;
            perspective: 1000px;
        }

        /* Текстура шума (вынесена отдельно для оптимизации) */
        .noise-overlay {
            position: fixed;
            inset: 0;
            background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" opacity="0.15"/></filter><rect width="100" height="100" filter="url(%23n)"/></svg>');
            opacity: 0.1;
            pointer-events: none;
            z-index: 1;
            mix-blend-mode: multiply;
        }

        .text-wrapper {
            position: relative;
            transform-style: preserve-3d;
            animation: rotate var(--anim-speed) linear infinite;
        }

        .text-container {
            font-family: 'Pinyon Script', cursive;
            font-size: clamp(40px, 15vw, 120px); /* Адаптивный размер */
            color: var(--text-color);
            letter-spacing: 8px;
            filter: url(#grainy) contrast(1.2) brightness(0.9);
            white-space: nowrap;
            backface-visibility: hidden; /* Скрывает заднюю сторону при вращении */
            user-select: none;
        }

        /* Создаем "заднюю" сторону текста */
        .text-container.back {
            position: absolute;
            top: 0;
            left: 0;
            transform: rotateY(180deg);
        }

        @keyframes rotate {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(360deg); }
        }

        .info {
            position: absolute;
            bottom: 30px;
            color: rgba(0, 0, 0, 0.4);
            font-family: sans-serif;
            font-size: 12px;
            letter-spacing: 2px;
            z-index: 3;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="noise-overlay"></div>

    <svg style="display: none;">
        <defs>
            <filter id="grainy">
                <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3" result="noise" />
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" />
            </filter>
        </defs>
    </svg>

    <a href="https://fakecrime.bio/rm" class="main-link">
        <div class="text-wrapper">
            <div class="text-container">LENORIO</div>
            <div class="text-container back">LENORIO</div>
        </div>
    </a>

    <div class="info">LENORIO</div>

</body>
</html>
