<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LENORIO | Ждите...</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Changa+One&family=Dancing+Script:wght@700&family=Fjalla+One&family=Gravitas+One&family=Inter:wght@800&family=Lobster&family=Lobster+Two:wght@700&family=Lora:wght@700&family=Orbitron:wght@900&family=Pacifico&family=Playfair+Display:wght@900&family=Playwrite+IE+Guides&family=Poppins:wght@900&family=Roboto+Slab:wght@900&family=Shizuru&family=Smooch+Sans:wght@900&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffffff;
            font-family: 'Inter', sans-serif;
            color: #000000;
            overflow: hidden;
            /* Курсор в виде указателя, так как всё кликабельно */
            cursor: pointer;
            user-select: none;
        }

        /* Чтобы ссылка работала на весь экран */
        .main-link {
            text-decoration: none;
            color: inherit;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        .container {
            font-size: 54px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 15px; 
        }

        .brand-wrapper {
            display: inline-flex;
            justify-content: flex-end; 
            width: 420px; 
            flex-shrink: 0;
        }

        .brand-name {
            animation: fontSwap 1.8s infinite steps(1);
            text-align: right;
            white-space: nowrap;
        }

        @keyframes fontSwap {
            0%   { font-family: 'Playwrite IE Guides'; }
            5.5% { font-family: 'Playfair Display'; }
            11%  { font-family: 'Roboto Slab'; }
            16.5%{ font-family: 'Lora'; }
            22%  { font-family: 'Fjalla One'; }
            27.5%{ font-family: 'Bungee'; }
            33%  { font-family: 'Smooch Sans'; }
            38.5%{ font-family: 'Shizuru'; }
            44%  { font-family: 'Dancing Script'; }
            49.5%{ font-family: 'Poppins'; }
            55%  { font-family: 'Changa One'; }
            60.5%{ font-family: 'Pacifico'; }
            66%  { font-family: 'Lobster Two'; }
            71.5%{ font-family: 'Lobster'; }
            77%  { font-family: 'Gravitas One'; }
            82.5%{ font-family: 'Orbitron'; }
            88%  { font-family: 'Inter'; font-weight: 900; }
            93.5%{ font-family: 'Arial'; } 
            100% { font-family: 'Playwrite IE Guides'; }
        }

        .highlight-box {
            position: relative;
            display: inline-flex;
            flex-direction: column;
            background: linear-gradient(135deg, #00d4ff, #0072ff);
            border-radius: 18px;
            overflow: hidden;
            height: 80px;
            box-shadow: 0 8px 25px rgba(0, 114, 255, 0.2);
            vertical-align: middle;
        }

        .sizer {
            visibility: hidden;
            height: 0;
            padding: 0 35px;
            white-space: nowrap;
            font-size: 54px; 
            font-weight: 800;
        }

        .roller-list {
            margin: 0;
            padding: 0;
            list-style: none;
            position: absolute;
            width: 100%;
            /* 9 слов + 1 дубликат = 18 секунд */
            animation: scroll-up 18s infinite cubic-bezier(0.8, 0, 0.2, 1);
        }

        .roller-list li {
            height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            padding: 0 35px;
            white-space: nowrap;
        }

        /* Анимация для 9 слов + копия (10 позиций) */
        @keyframes scroll-up {
            0%, 9%     { transform: translateY(0); }
            11%, 20%   { transform: translateY(-80px); }
            22%, 31%   { transform: translateY(-160px); }
            33%, 42%   { transform: translateY(-240px); }
            44%, 53%   { transform: translateY(-320px); }
            55%, 64%   { transform: translateY(-400px); }
            66%, 75%   { transform: translateY(-480px); }
            77%, 86%   { transform: translateY(-560px); }
            88%, 97%   { transform: translateY(-640px); }
            100%       { transform: translateY(-720px); } 
        }
    </style>
</head>
<body>

    <a href="https://fakecrime.bio/rm" class="main-link">
        <div class="container">
            <div class="brand-wrapper">
                <span class="brand-name">LENORIO</span>
            </div>
            
            <span>ЭТО</span>
            
            <div class="highlight-box">
                <div class="sizer">ПРОГРАММИРОВАНИЕ</div>
                
                <ul class="roller-list">
                    <li>СТИЛЬ</li>
                    <li>КАЧЕСТВО</li>
                    <li>ПРОГРАММИРОВАНИЕ</li>
                    <li>ЗНАНИЯ</li>
                    <li>ИННОВАЦИИ</li>
                    <li>УМЕНИЯ</li>
                    <li>GITHUB</li>
                    <li>TELEGRAM</li>
                    <li>FAKECRIME</li>
                    <li>СТИЛЬ</li> </ul>
            </div>
        </div>
    </a>

    <script>
        const words = ["СТИЛЬ", "GITHUB", "TELEGRAM", "FAKECRIME", "ЗНАНИЯ"];
        const brand = "LENORIO";
        const separator = " | ";
        const typeSpeed = 150;
        const delayBetweenWords = 2500;
        
        let wordIndex = 0;
        let charIndex = 0;
        let isDeleting = false;

        function animateTitle() {
            const currentWord = words[wordIndex];
            if (isDeleting) charIndex--; else charIndex++;

            document.title = brand + separator + currentWord.substring(0, charIndex);

            let typeDelay = typeSpeed;
            if (isDeleting) typeDelay /= 2;

            if (!isDeleting && charIndex === currentWord.length) {
                isDeleting = true;
                typeDelay = delayBetweenWords;
            } else if (isDeleting && charIndex === 0) {
                isDeleting = false;
                wordIndex = (wordIndex + 1) % words.length;
                typeDelay = 500;
            }
            setTimeout(animateTitle, typeDelay);
        }
        window.onload = animateTitle;
    </script>
</body>
</html>
