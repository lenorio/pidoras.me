<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LENORIO</title>
    <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            background: #ffffff;
            perspective: 1000px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise"/></filter><rect width="100" height="100" fill="white" filter="url(%23noise)"/></svg>');
            background-size: 100px 100px;
            opacity: 0.15;
            pointer-events: none;
            z-index: 1;
            mix-blend-mode: overlay;
        }

        .container {
            position: relative;
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        .text-container {
            font-family: 'Pinyon Script', cursive;
            font-size: 120px;
            font-weight: 400;
            color: #000000;
            animation: rotate 4s linear infinite, visibility 4s linear infinite;
            letter-spacing: 8px;
            position: absolute;
            filter: url(#grainy) contrast(1.4) brightness(0.92) saturate(0.8);
            text-shadow: 
                2px 2px 1px rgba(0, 0, 0, 0.15),
                -1px -1px 1px rgba(0, 0, 0, 0.1),
                1px -1px 0px rgba(0, 0, 0, 0.08),
                -1px 1px 0px rgba(0, 0, 0, 0.08);
            font-style: italic;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        .text-container.back {
            animation: rotate 4s linear infinite, visibilityBack 4s linear infinite;
            transform: rotateY(180deg) scaleX(-1);
            filter: url(#grainy) contrast(1.4) brightness(0.92) saturate(0.8);
        }

        @keyframes visibility {
            0%, 49% {
                opacity: 1;
            }
            50%, 100% {
                opacity: 0;
            }
        }

        @keyframes visibilityBack {
            0%, 49% {
                opacity: 0;
            }
            50%, 100% {
                opacity: 1;
            }
        }

        @keyframes rotate {
            0% {
                transform: rotateY(0deg);
            }
            100% {
                transform: rotateY(360deg);
            }
        }

        .info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(0, 0, 0, 0.4);
            font-size: 14px;
            text-align: center;
            z-index: 3;
        }
    </style>
</head>
<body>
    <svg style="display: none;">
        <defs>
            <filter id="grainy">
                <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="5" result="noise" seed="2"/>
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.5" xChannelSelector="R" yChannelSelector="G"/>
            </filter>
        </defs>
    </svg>

    <div class="container">
        <div class="text-container">LENORIO</div>
        <div class="text-container back">LENORIO</div>
    </div>

    <div class="info">
        <p>LENORIO</p>
    </div>

    <script>
        document.body.addEventListener('click', function() {
            window.location.href = 'https://fakecrime.bio/rm';
        });
    </script>
</body>
</html>
